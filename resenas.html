<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./img/utensils-solid.png" type="image/x-icon">
  <title>Cook.io — Reseñas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="Estilos.css">
</head>
<body>

<nav class="navbar">
  <div class="container-fluid d-flex align-items-center">
    <a class="navbar-brand" href="index.html">
      Cook<span style="color:var(--gold)">.</span>io
      <i class="fa-solid fa-utensils"></i>
    </a>
    <div class="nav-links">
      <a href="index.html">Inicio</a>
      <a href="resenas.html" class="active">Reseñas</a>
      <a href="agregar.html">Agregar reseña</a>
    </div>
    <div class="nav-auth-area" id="nav-auth-area"></div>
  </div>
</nav>

<div class="page-hero">
  <h1>Reseñas <em>Destacadas</em></h1>
  <p>Lo que opinan los comensales de los mejores restaurantes.</p>
  <a href="agregar.html" class="add-review-cta">
    <i class="fa-solid fa-pen-to-square"></i> Escribir una reseña
  </a>
</div>
<div class="section-header">
  <div class="line"></div>
  <div class="section-label">
    <i class="fa-solid fa-star icon"></i>
    <h2>Todas las reseñas</h2>
    <i class="fa-solid fa-star icon"></i>
  </div>
  <div class="line right"></div>
</div>

<div class="reviews-section">
  <div class="review-grid" id="reviews-grid">
    <div class="reviews-loading"><span class="spinner"></span>Cargando reseñas…</div>
  </div>
</div>
<footer class="footer">
  <span class="footer-brand">Cook<span style="color:var(--gold)">.</span>io</span>
  <span class="footer-text">© 2025 Cook.io — Todos los derechos reservados</span>
</footer>
<div class="modal fade modal-dark" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-2">
      <div class="modal-header">
        <h5 class="modal-title" style="font-family:'Playfair Display',serif">Editar reseña</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label>Restaurante</label>
          <input type="text" id="edit-titulo">
        </div>
        <div class="form-group">
          <label>Calificación (1-5)</label>
          <input type="number" id="edit-calificacion" min="1" max="5">
        </div>
        <div class="form-group">
          <label>Reseña</label>
          <textarea id="edit-contenido" rows="4"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-nav btn-nav-outline" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn-nav btn-nav-gold" onclick="handleEditSave()">Guardar cambios</button>
      </div>
    </div>
  </div>
</div>
<div id="toast">
  <span class="t-icon"><i class="fa-solid fa-circle-check"></i></span>
  <span class="t-msg" id="toast-msg"></span>
</div>

<script>
  const API = 'https://cook-back-xwlk.onrender.com/api'
  let currentUser = null
  let currentUserEmail = ''

  function toast(msg, type = 'info') {
    const el = document.getElementById('toast')
    const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' }
    el.querySelector('.t-icon').innerHTML = `<i class="fa-solid ${icons[type]}"></i>`
    document.getElementById('toast-msg').textContent = msg
    el.className = `show ${type}`
    setTimeout(() => el.className = '', 3500)
  }

  function starsHtml(n) {
    return '★'.repeat(n) + '☆'.repeat(5 - n)
  }

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr)
    const m = Math.floor(diff / 60000)
    if (m < 1)  return 'Ahora mismo'
    if (m < 60) return `Hace ${m} min`
    const h = Math.floor(m / 60)
    if (h < 24) return `Hace ${h}h`
    const d = Math.floor(h / 24)
    if (d < 30) return `Hace ${d} días`
    return new Date(dateStr).toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' })
  }

  function initials(email) {
    return email ? email.substring(0, 2).toUpperCase() : '??'
  }

  function escHtml(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
  }
  function loadSession() {
    const saved = localStorage.getItem('cookio_user')
    if (saved) { try { currentUser = JSON.parse(saved) } catch {} }
    const savedEmail = localStorage.getItem('cookio_email')
    if (savedEmail) currentUserEmail = savedEmail
  }

  function clearSession() {
    currentUser = null
    currentUserEmail = ''
    localStorage.removeItem('cookio_user')
    localStorage.removeItem('cookio_email')
  }
  function renderNavbar() {
    const navArea = document.getElementById('nav-auth-area')
    if (!navArea) return
    if (currentUser) {
      const av = initials(currentUserEmail)
      navArea.innerHTML = `
        <div class="nav-user-info">
          <div class="avatar">${av}</div>
          <span>${currentUser.nombre}</span>
        </div>
        <button class="btn-nav btn-nav-outline" onclick="handleLogout()">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>`
    } else {
      navArea.innerHTML = `
        <a class="btn-nav btn-nav-outline" href="perfil.html">Iniciar sesión</a>
        <a class="btn-nav btn-nav-gold"    href="perfil.html">Registrarse</a>`
    }
  }

  function handleLogout() {
    clearSession()
    toast('Sesión cerrada.', 'info')
    setTimeout(() => { renderNavbar(); loadReviews() }, 400)
  }
  async function loadReviews() {
    const grid = document.getElementById('reviews-grid')
    grid.innerHTML = '<div class="reviews-loading"><span class="spinner"></span>Cargando reseñas…</div>'
    try {
      const res  = await fetch(`${API}/resenas`)
      const data = await res.json()
      if (!res.ok) throw new Error(data.message)
      if (!data.length) {
        grid.innerHTML = '<div class="reviews-empty"><i class="fa-solid fa-utensils" style="font-size:2rem;margin-bottom:14px;display:block"></i>Aún no hay reseñas. ¡Sé el primero!</div>'
        return
      }
      grid.innerHTML = data.map(r => reviewCardHtml(r)).join('')
    } catch (e) {
      grid.innerHTML = `<div class="reviews-empty"><i class="fa-solid fa-triangle-exclamation"></i>&nbsp; No se pudieron cargar las reseñas.</div>`
    }
  }

  function reviewCardHtml(r) {
    const isOwn = currentUser && r.user && r.user._id === currentUser._id
    const stars  = starsHtml(r.calificacion)
    const initAv = r.user?.email ? initials(r.user.email) : '??'
    const emailDisplay = r.user?.email ?? '–'
    return `
    <div class="review-card ${isOwn ? 'own' : ''}" data-id="${r._id}">
      <div class="edit-bar">
        <button class="btn-edit"   onclick="openEdit('${r._id}','${escHtml(r.titulo)}',${r.calificacion},'${escHtml(r.contenido)}')">Editar</button>
        <button class="btn-delete" onclick="deleteReview('${r._id}')">Eliminar</button>
      </div>
      <div class="review-card-body">
        <div class="review-meta">
          <div class="review-stars">${stars}</div>
          <span class="review-date">${timeAgo(r.createdAt)}</span>
        </div>
        <h3 class="review-title">${escHtml(r.titulo)}</h3>
        <p class="review-text">${escHtml(r.contenido)}</p>
        <div class="review-author">
          <div class="author-avatar">${initAv}</div>
          <div>
            <div class="author-name">${emailDisplay.split('@')[0]}</div>
            <div class="author-handle">@${emailDisplay.split('@')[0].toLowerCase()}</div>
          </div>
        </div>
      </div>
    </div>`
  }
  function openEdit(id, titulo, calificacion, contenido) {
    document.getElementById('edit-id').value           = id
    document.getElementById('edit-titulo').value       = titulo
    document.getElementById('edit-calificacion').value = calificacion
    document.getElementById('edit-contenido').value    = contenido
    new bootstrap.Modal(document.getElementById('editModal')).show()
  }

  async function handleEditSave() {
    const id           = document.getElementById('edit-id').value
    const titulo       = document.getElementById('edit-titulo').value.trim()
    const calificacion = parseInt(document.getElementById('edit-calificacion').value)
    const contenido    = document.getElementById('edit-contenido').value.trim()
    if (!titulo || !calificacion || !contenido) return toast('Completa todos los campos.', 'error')
    try {
      const res  = await fetch(`${API}/resenas/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${currentUser.token}` },
        body: JSON.stringify({ titulo, calificacion, contenido })
      })
      const data = await res.json()
      if (!res.ok) throw new Error(data.message || 'Error al editar')
      bootstrap.Modal.getInstance(document.getElementById('editModal')).hide()
      toast('Reseña actualizada.', 'success')
      loadReviews()
    } catch (e) { toast(e.message, 'error') }
  }
  async function deleteReview(id) {
    if (!confirm('¿Eliminar esta reseña?')) return
    try {
      const res = await fetch(`${API}/resenas/${id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${currentUser.token}` }
      })
      if (!res.ok) throw new Error('No se pudo eliminar')
      toast('Reseña eliminada.', 'success')
      loadReviews()
    } catch (e) { toast(e.message, 'error') }
  }
  loadSession()
  renderNavbar()
  loadReviews()
</script>
</body>
</html>
