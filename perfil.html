<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./img/utensils-solid.png" type="image/x-icon">
  <title>Cook.io — Perfil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="Estilos.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="container-fluid d-flex align-items-center">
    <a class="navbar-brand" href="index.html">
      Cook<span style="color:var(--gold)">.</span>io
      <i class="fa-solid fa-utensils"></i>
    </a>
    <div class="nav-links">
      <a href="index.html">Inicio</a>
      <a href="resenas.html">Reseñas</a>
      <a href="agregar.html">Agregar reseña</a>
    </div>
    <div class="nav-auth-area" id="nav-auth-area"><!-- JS --></div>
  </div>
</nav>

<!-- PAGE HERO -->
<div class="page-hero" id="page-hero">
  <h1 id="page-title">Mi <em>Perfil</em></h1>
  <p id="page-subtitle">Gestiona tu cuenta y tus reseñas.</p>
</div>

<!-- Panel NO logueado -->
<div class="login-section" id="auth-logged-out">
  <div class="login-card">
    <div class="login-icon"><i class="fa-solid fa-utensils"></i></div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Registrarse</button>
    </div>

    <!-- LOGIN -->
    <div id="panel-login">
      <div class="login-form">
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="login-email" placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button class="login-btn" onclick="handleLogin()">
          <i class="fa-solid fa-arrow-right-to-bracket"></i>&nbsp; Iniciar sesión
        </button>
      </div>
    </div>

    <!-- REGISTER -->
    <div id="panel-register" style="display:none">
      <div class="login-form">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="reg-nombre" placeholder="Tu nombre">
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="reg-email" placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="reg-password" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label>Confirmar contraseña</label>
          <input type="password" id="reg-password2" placeholder="••••••••">
        </div>
        <button class="login-btn" onclick="handleRegister()">
          <i class="fa-solid fa-user-plus"></i>&nbsp; Crear cuenta
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Panel LOGUEADO -->
<div class="login-section" id="auth-logged-in">
  <div class="user-panel">
    <div class="big-avatar" id="user-avatar-big">?</div>
    <h3 id="user-nombre-panel">–</h3>
    <p class="user-email" id="user-email-panel">–</p>
    <button class="btn-logout" onclick="handleLogoutPage()">
      <i class="fa-solid fa-arrow-right-from-bracket"></i>&nbsp; Cerrar sesión
    </button><br>
    <button class="btn-delete-account" onclick="handleDeleteAccount()">Eliminar cuenta</button>
    <div class="profile-links">
      <a href="resenas.html"><i class="fa-solid fa-star"></i> Ver reseñas</a>
      <a href="agregar.html"><i class="fa-solid fa-pen-to-square"></i> Agregar reseña</a>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer" style="margin-top:80px;">
  <span class="footer-brand">Cook<span style="color:var(--gold)">.</span>io</span>
  <span class="footer-text">© 2025 Cook.io — Todos los derechos reservados</span>
</footer>

<!-- TOAST -->
<div id="toast">
  <span class="t-icon"><i class="fa-solid fa-circle-check"></i></span>
  <span class="t-msg" id="toast-msg"></span>
</div>

<script>
  // ── Config ────────────────────────────────────────────────
  const API = 'https://cook-back-xwlk.onrender.com/api'
  let currentUser = null
  let currentUserEmail = ''

  // ── Utilidades ────────────────────────────────────────────
  function toast(msg, type = 'info') {
    const el = document.getElementById('toast')
    const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' }
    el.querySelector('.t-icon').innerHTML = `<i class="fa-solid ${icons[type]}"></i>`
    document.getElementById('toast-msg').textContent = msg
    el.className = `show ${type}`
    setTimeout(() => el.className = '', 3500)
  }

  function initials(email) {
    return email ? email.substring(0, 2).toUpperCase() : '??'
  }

  // ── Sesión ────────────────────────────────────────────────
  function loadSession() {
    const saved = localStorage.getItem('cookio_user')
    if (saved) { try { currentUser = JSON.parse(saved) } catch {} }
    const savedEmail = localStorage.getItem('cookio_email')
    if (savedEmail) currentUserEmail = savedEmail
  }

  function saveSession(user, email) {
    currentUser = user
    currentUserEmail = email
    localStorage.setItem('cookio_user', JSON.stringify(user))
    localStorage.setItem('cookio_email', email)
  }

  function clearSession() {
    currentUser = null
    currentUserEmail = ''
    localStorage.removeItem('cookio_user')
    localStorage.removeItem('cookio_email')
  }

  // ── Navbar ────────────────────────────────────────────────
  function renderNavbar() {
    const navArea = document.getElementById('nav-auth-area')
    if (!navArea) return
    if (currentUser) {
      const av = initials(currentUserEmail)
      navArea.innerHTML = `
        <div class="nav-user-info">
          <div class="avatar">${av}</div>
          <span>${currentUser.nombre}</span>
        </div>
        <button class="btn-nav btn-nav-outline" onclick="handleLogout()">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>`
    } else {
      navArea.innerHTML = `
        <a class="btn-nav btn-nav-outline" href="perfil.html">Iniciar sesión</a>
        <a class="btn-nav btn-nav-gold"    href="perfil.html">Registrarse</a>`
    }
  }

  function handleLogout() {
    clearSession()
    toast('Sesión cerrada.', 'info')
    setTimeout(() => { renderNavbar(); renderAuthSection() }, 400)
  }

  // ── Auth section ──────────────────────────────────────────
  function renderAuthSection() {
    const loggedOut = document.getElementById('auth-logged-out')
    const loggedIn  = document.getElementById('auth-logged-in')
    const pageTitle = document.getElementById('page-title')
    const pageSub   = document.getElementById('page-subtitle')

    if (currentUser) {
      loggedOut.style.display = 'none'
      loggedIn.style.display  = 'block'
      pageTitle.innerHTML = `Mi <em>Perfil</em>`
      pageSub.textContent = 'Gestiona tu cuenta y tus reseñas.'
      document.getElementById('user-nombre-panel').textContent = currentUser.nombre
      document.getElementById('user-email-panel').textContent  = currentUserEmail
      document.getElementById('user-avatar-big').textContent   = initials(currentUserEmail)
    } else {
      loggedOut.style.display = 'block'
      loggedIn.style.display  = 'none'
      pageTitle.innerHTML = `Iniciar <em>Sesión</em>`
      pageSub.textContent = 'Accede a tu cuenta o créate una nueva.'
    }
  }
  function switchTab(tab) {
    document.getElementById('panel-login').style.display    = tab === 'login'    ? '' : 'none'
    document.getElementById('panel-register').style.display = tab === 'register' ? '' : 'none'
    document.getElementById('tab-login').classList.toggle('active',    tab === 'login')
    document.getElementById('tab-register').classList.toggle('active', tab === 'register')
  }
  async function handleLogin() {
    const email    = document.getElementById('login-email').value.trim()
    const password = document.getElementById('login-password').value
    if (!email || !password) return toast('Completa todos los campos.', 'error')
    try {
      const res  = await fetch(`${API}/users/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
      const data = await res.json()
      if (!res.ok) throw new Error(data.message || 'Error al iniciar sesión')
      saveSession(data, email)
      toast(`¡Bienvenido, ${data.nombre}!`, 'success')
      renderNavbar()
      renderAuthSection()
    } catch (e) { toast(e.message, 'error') }
  }
  async function handleRegister() {
    const nombre    = document.getElementById('reg-nombre').value.trim()
    const email     = document.getElementById('reg-email').value.trim()
    const password  = document.getElementById('reg-password').value
    const password2 = document.getElementById('reg-password2').value
    if (!nombre || !email || !password || !password2) return toast('Completa todos los campos.', 'error')
    try {
      const res  = await fetch(`${API}/users/register`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, email, password, password2 })
      })
      const data = await res.json()
      if (!res.ok) throw new Error(data.message || 'Error al registrar')
      toast('¡Cuenta creada! Ahora inicia sesión.', 'success')
      switchTab('login')
      document.getElementById('login-email').value = email
    } catch (e) { toast(e.message, 'error') }
  }

  function handleLogoutPage() {
    clearSession()
    toast('Sesión cerrada.', 'info')
    renderNavbar()
    renderAuthSection()
  }

  async function handleDeleteAccount() {
    if (!confirm('¿Seguro que quieres eliminar tu cuenta? Esta acción no se puede deshacer.')) return
    try {
      const res = await fetch(`${API}/users/delete`, {
        method: 'POST', headers: { Authorization: `Bearer ${currentUser.token}` }
      })
      if (!res.ok) throw new Error('No se pudo eliminar la cuenta')
      clearSession()
      toast('Cuenta eliminada.', 'info')
      renderNavbar()
      renderAuthSection()
    } catch (e) { toast(e.message, 'error') }
  }

  loadSession()
  renderNavbar()
  renderAuthSection()
</script>
</body>
</html>
